# fly.toml app configuration for Fly.io

app = "lgtm-bot"
primary_region = "iad"

[build]

[env]
  DATABASE_URL = "sqlite+aiosqlite:////data/lgtm.db"
  GITHUB_REPO = "your-org/your-repo"
  DIGEST_HOUR = "14"
  DIGEST_MINUTE = "30"

[mounts]
  source = "lgtm_data"
  destination = "/data"
  initial_size = "1gb"
